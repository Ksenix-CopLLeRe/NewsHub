services:
  feed-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feed-service
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - DATABASE_URL=sqlite:///./feed.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  feed_db: