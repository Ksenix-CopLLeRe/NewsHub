services:
  postgres:
    image: postgres:16-alpine
    container_name: user-content-postgres
    environment:
      POSTGRES_USER: usercontent
      POSTGRES_PASSWORD: usercontent
      POSTGRES_DB: usercontent
    ports:
      - "5433:5432"
    volumes:
      - user_content_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usercontent"]
      interval: 2s
      timeout: 5s
      retries: 5

  user-content-service:
    build:
      context: ..
      dockerfile: user_content_service/Dockerfile.user-content-service
    container_name: user-content-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://usercontent:usercontent@postgres:5432/usercontent
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  user_content_pgdata:
