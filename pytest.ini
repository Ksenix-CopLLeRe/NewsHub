# pytest.ini
[pytest]
# Пути для поиска тестов
testpaths = tests

# Python path
pythonpath = . feed_service reactions_service user_content_service

# Опции запуска
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider

# Маркеры
markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    unit: marks tests as unit tests

# Переменные окружения для тестов
env =
    ENVIRONMENT=test
    DEBUG=false
    DATABASE_URL=sqlite:///:memory:

# Исключения
norecursedirs = .git .tox venv env __pycache__ node_modules

# Asyncio режим
asyncio_mode = auto